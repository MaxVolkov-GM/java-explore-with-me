server.port=8080

spring.application.name=ewm-main-service

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:6542/ewm}
spring.datasource.username=${POSTGRES_USER:ewm}
spring.datasource.password=${POSTGRES_PASSWORD:ewm}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.sql.init.mode=always

stats-server.url=${STATS_SERVER_URL:http://localhost:9090}

management.endpoints.web.exposure.include=health,info